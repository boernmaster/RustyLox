<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - LoxBerry</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                <img src="/static/logo.svg" alt="RustyLox" style="height: 36px;">
            </a>
        </div>
        <ul class="nav-menu">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/miniserver">Miniserver</a></li>
            <li><a href="/mqtt/monitor">MQTT Monitor</a></li>
            <li><a href="/mqtt/config">MQTT Config</a></li>
            <li><a href="/plugins">Plugins</a></li>
            <li><a href="/logs">Logs</a></li>
            <li><a href="/backup">Backup</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        {{ content|safe }}
    </main>

    <footer class="footer">
        <p>RustyLox v4.0.0 | &copy; 2026</p>
    </footer>

    <div id="toast-container"></div>

    <script>
    // Auto-dismiss toasts after 4s
    function showToast(msg, type) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast toast-' + (type || 'info');
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }
    // Convert alert divs injected by HTMX into toasts
    document.body.addEventListener('htmx:afterSwap', function(e) {
        e.target.querySelectorAll('.alert-success, .alert-danger, .alert-warning').forEach(function(el) {
            const type = el.classList.contains('alert-success') ? 'success'
                       : el.classList.contains('alert-danger')  ? 'error' : 'info';
            showToast(el.textContent.trim(), type);
            el.remove();
        });
    });
    </script>
</body>
</html>
