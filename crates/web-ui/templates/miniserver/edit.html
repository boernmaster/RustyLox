<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_new %}Add{% else %}Edit{% endif %} Miniserver - LoxBerry</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">LoxBerry Rust</a>
        </div>
        <ul class="nav-menu">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/miniserver" class="active">Miniserver</a></li>
            <li><a href="/mqtt/monitor">MQTT Monitor</a></li>
            <li><a href="/mqtt/config">MQTT Config</a></li>
            <li><a href="/plugins">Plugins</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1>{% if is_new %}Add New Miniserver{% else %}Edit Miniserver{% endif %}</h1>

        <div class="card">
            <form method="post"
                  {% if is_new %}action="/miniserver/add"{% else %}action="/miniserver/{{ miniserver.as_ref().unwrap().id.as_ref().unwrap() }}/edit"{% endif %}>

                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name"
                           value="{% if let Some(ms) = miniserver %}{{ ms.name }}{% endif %}"
                           required placeholder="e.g., Living Room Miniserver">
                </div>

                <div class="form-group">
                    <label for="ipaddress">IP Address *</label>
                    <input type="text" id="ipaddress" name="ipaddress"
                           value="{% if let Some(ms) = miniserver %}{{ ms.ipaddress }}{% endif %}"
                           required placeholder="e.g., 192.168.1.77">
                </div>

                <div class="form-group">
                    <label for="port">Port *</label>
                    <input type="text" id="port" name="port"
                           value="{% if let Some(ms) = miniserver %}{{ ms.port }}{% else %}80{% endif %}"
                           required placeholder="80">
                </div>

                <div class="form-section">
                    <h3>Authentication (Phase 4a)</h3>

                    <div class="form-group">
                        <label for="admin">Username *</label>
                        <input type="text" id="admin" name="admin"
                               value="{% if let Some(ms) = miniserver %}{{ ms.admin }}{% endif %}"
                               required placeholder="admin">
                        <small>Miniserver admin username</small>
                    </div>

                    <div class="form-group">
                        <label for="pass">Password *</label>
                        <input type="password" id="pass" name="pass"
                               value="{% if let Some(ms) = miniserver %}{{ ms.pass }}{% endif %}"
                               required placeholder="••••••••">
                        <small>Miniserver admin password</small>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" name="useclouddns" value="1"
                               {% if let Some(ms) = miniserver %}{% if ms.useclouddns %}checked{% endif %}{% endif %}>
                        Use CloudDNS
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        {% if is_new %}Add Miniserver{% else %}Save Changes{% endif %}
                    </button>
                    <a href="/miniserver" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>LoxBerry Rust v4.0.0 | &copy; 2026</p>
    </footer>
</body>
</html>
