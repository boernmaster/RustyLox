<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Viewer - LoxBerry</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                <img src="/static/logo.svg" alt="RustyLox" style="height: 36px;">
            </a>
        </div>
        <ul class="nav-menu">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/miniserver">Miniserver</a></li>
            <li><a href="/mqtt/monitor">MQTT Monitor</a></li>
            <li><a href="/mqtt/config">MQTT Config</a></li>
            <li><a href="/plugins">Plugins</a></li>
            <li><a href="/logs" class="active">Logs</a></li>
            <li><a href="/backup">Backup</a></li>
            <li><a href="/admin/users">Users</a></li>
            <li><a href="/admin/api-keys">API Keys</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1>Log Viewer</h1>

        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
                <div>
                    <label for="log-select"><strong>Log File:</strong></label>
                    <select id="log-select"
                            hx-get="/logs/view"
                            hx-target="#log-content"
                            hx-trigger="change"
                            hx-include="[name='lines'],[name='search']"
                            name="file"
                            style="margin-left: 8px; padding: 6px 10px;">
                        <option value="">-- Select a log file --</option>
                        {% for file in log_files %}
                        <option value="{{ file.name }}">{{ file.name }} ({{ file.size_human }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="lines-select"><strong>Lines:</strong></label>
                    <select id="lines-select"
                            name="lines"
                            hx-get="/logs/view"
                            hx-target="#log-content"
                            hx-trigger="change"
                            hx-include="[name='file'],[name='search']"
                            style="margin-left: 8px; padding: 6px 10px;">
                        <option value="100">Last 100</option>
                        <option value="500">Last 500</option>
                        <option value="1000">Last 1000</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label for="search-input"><strong>Filter:</strong></label>
                    <input id="search-input"
                           type="text"
                           name="search"
                           placeholder="Search log lines..."
                           hx-get="/logs/view"
                           hx-target="#log-content"
                           hx-trigger="input changed delay:400ms"
                           hx-include="[name='file'],[name='lines']"
                           style="margin-left: 8px; padding: 6px 10px; width: calc(100% - 80px);">
                </div>
            </div>
        </div>

        {% if log_files.is_empty() %}
        <div class="card">
            <p>No log files found.</p>
        </div>
        {% else %}
        <div id="log-content" class="card">
            <p style="color: #888;">Select a log file above to view its contents.</p>
        </div>
        {% endif %}
    </main>

    <footer class="footer">
        <p>RustyLox {{ version }} | &copy; 2026</p>
    </footer>
</body>
</html>
