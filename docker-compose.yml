
services:
  rustylox:
    build:
      context: .
      args:
        - GIT_HASH=${GIT_HASH:-unknown}
        - GIT_TAG=${GIT_TAG:-}
        - GIT_DIRTY=${GIT_DIRTY:-false}
    image: rustylox:latest
    container_name: rustylox
    restart: unless-stopped
    ports:
      # - "8080:8080"       # Web UI / API + Virtual HTTP Input from Miniserver
      - "80:80"       # Web UI / API + Virtual HTTP Input from Minise
      - "6066:6066"       # Loxone Cloud Emulator (weather.loxone.com)
      - "8090:8090/udp"   # Miniserver Virtual UDP Output receiver
      - "11884:11884/udp" # MQTT UDP input
    volumes:
      - ./volumes/config:/opt/loxberry/config
      - ./volumes/data:/opt/loxberry/data
      - ./volumes/log:/opt/loxberry/log
      - ./volumes/webfrontend:/opt/loxberry/webfrontend
      - ./volumes/templates:/opt/loxberry/templates/plugins
      - ./volumes/bin:/opt/loxberry/bin/plugins
    environment:
      - RUST_LOG=debug
      - LBHOMEDIR=/opt/loxberry
      # - BIND_ADDR=0.0.0.0:8080
      - BIND_ADDR=0.0.0.0:80
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - mosquitto
    networks:
      - loxberry-net

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./volumes/mosquitto/config:/mosquitto/config
      - ./volumes/mosquitto/data:/mosquitto/data
      - ./volumes/mosquitto/log:/mosquitto/log
    networks:
      - loxberry-net

networks:
  loxberry-net:
    driver: bridge

volumes:
  config:
  data:
  log:
