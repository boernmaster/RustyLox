<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- RustyLox Logo with Icon -->

  <!-- Icon portion (similar to favicon) -->
  <g transform="translate(30, 30)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="24" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1.5"/>

    <!-- Center hexagon -->
    <path d="M 0,-8 L 7,-4 L 7,4 L 0,8 L -7,4 L -7,-4 Z"
          fill="#ff6b35" opacity="0.9"/>

    <!-- Gear teeth -->
    <g stroke="#ff6b35" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-13"/>
      <line x1="16" y1="-9" x2="11" y2="-6"/>
      <line x1="16" y1="9" x2="11" y2="6"/>
      <line x1="0" y1="18" x2="0" y2="13"/>
      <line x1="-16" y1="9" x2="-11" y2="6"/>
      <line x1="-16" y1="-9" x2="-11" y2="-6"/>
    </g>

    <!-- Connection nodes -->
    <circle cx="0" cy="-15" r="2" fill="#4ecdc4"/>
    <circle cx="13" cy="-7.5" r="2" fill="#4ecdc4"/>
    <circle cx="13" cy="7.5" r="2" fill="#4ecdc4"/>
    <circle cx="0" cy="15" r="2" fill="#4ecdc4"/>
    <circle cx="-13" cy="7.5" r="2" fill="#4ecdc4"/>
    <circle cx="-13" cy="-7.5" r="2" fill="#4ecdc4"/>
  </g>

  <!-- Text: RustyLox -->
  <text x="65" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff6b35">
    Rusty<tspan fill="#4ecdc4">Lox</tspan>
  </text>
</svg>
